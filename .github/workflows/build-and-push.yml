name: Build and Push Images

on:
  push:
    branches: [ "main" ]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REPO: recipes

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
        service_account: ${{ secrets.GCP_GITHUB_SA }}

    - name: Configure Docker for Artifact Registry
      run: |
        gcloud auth configure-docker $REGION-docker.pkg.dev

    - name: Build and Push read-api
      run: |
        docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/read-api:${{ github.sha }} ./read-api
        docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/read-api:${{ github.sha }}

    - name: Build and Push write-api
      run: |
        docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/write-api:${{ github.sha }} ./write-api
        docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/write-api:${{ github.sha }}

    - name: Build and Push worker
      run: |
        docker build -t $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/worker:${{ github.sha }} ./worker
        docker push $REGION-docker.pkg.dev/$PROJECT_ID/$REPO/worker:${{ github.sha }}
